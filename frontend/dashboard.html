<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quản lý chi tiêu</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Thư viện biểu đồ Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Thanh điều hướng -->
    <nav>
        <div class="nav-container">
            <h1>💰 Expense Tracker</h1>
            <div>
                <span id="user-name" style="margin-right: 15px; font-weight: bold;">Xin chào!</span>
                <button onclick="handleLogout()" style="width: auto; padding: 5px 15px; background: #f44336;">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        
        <!-- Phần Tổng quan -->
        <div class="summary-cards">
            <div class="card">
                <h3>Tổng số dư</h3>
                <p id="total-balance" class="money">0 đ</p>
            </div>
            <div class="card">
                <h3>Thu nhập tháng này</h3>
                <p id="month-income" class="money text-green">0 đ</p>
            </div>
            <div class="card">
                <h3>Chi tiêu tháng này</h3>
                <p id="month-expense" class="money text-red">0 đ</p>
            </div>
        </div>

        <!-- Phần Thao tác nhanh -->
        <div class="actions">
            <button onclick="openModal('transaction-modal')">➕ Thêm Giao Dịch</button>
            <button onclick="openModal('wallet-modal')" style="background-color: #2196F3;">💼 Thêm Ví</button>
            <button onclick="openModal('category-modal')" style="background-color: #FF9800;">📂 Thêm Danh Mục</button>
        </div>

        <!-- Phần Biểu đồ & Danh sách -->
        <div class="main-content">
            <div class="chart-section card">
                <h3>Thống kê chi tiêu</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            
            <div class="list-section card">
                <h3>Giao dịch gần đây</h3>
                <ul id="transaction-list" class="transaction-list">
                    <!-- Dữ liệu sẽ được JS thêm vào đây -->
                    <li>Đang tải...</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- MODAL: Thêm Giao Dịch -->
    <div id="transaction-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('transaction-modal')">&times;</span>
            <h2>Thêm Giao Dịch Mới</h2>
            <input type="number" id="trans-amount" placeholder="Số tiền (VD: 50000)">
            <input type="text" id="trans-note" placeholder="Ghi chú (VD: Ăn sáng)">
            <select id="trans-type">
                <option value="expense">Chi tiêu (Expense)</option>
                <option value="income">Thu nhập (Income)</option>
            </select>
            <select id="trans-wallet">
                <!-- JS sẽ điền danh sách ví vào đây -->
            </select>
            <select id="trans-category">
                <!-- JS sẽ điền danh sách danh mục vào đây -->
            </select>
            <button onclick="addTransaction()">Lưu Giao Dịch</button>
        </div>
    </div>

    <!-- MODAL: Thêm Ví -->
    <div id="wallet-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('wallet-modal')">&times;</span>
            <h2>Thêm Ví Mới</h2>
            <input type="text" id="wallet-name" placeholder="Tên ví (VD: Tiền mặt)">
            <input type="number" id="wallet-balance" placeholder="Số dư ban đầu">
            <select id="wallet-type">
                <option value="cash">Tiền mặt</option>
                <option value="bank">Ngân hàng</option>
                <option value="e_wallet">Ví điện tử</option>
            </select>
            <button onclick="addWallet()">Lưu Ví</button>
        </div>
    </div>

    <!-- MODAL: Thêm Danh Mục -->
    <div id="category-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('category-modal')">&times;</span>
            <h2>Thêm Danh Mục</h2>
            <input type="text" id="cat-name" placeholder="Tên danh mục (VD: Ăn uống)">
            <select id="cat-type">
                <option value="expense">Chi tiêu</option>
                <option value="income">Thu nhập</option>
            </select>
            <button onclick="addCategory()">Lưu Danh Mục</button>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
